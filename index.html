<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <title>AppShelf</title>
  <meta name="description" content="A personal app catalog for your iPhone">

  <!-- Open Graph -->
  <meta property="og:title" content="AppShelf">
  <meta property="og:description" content="A personal app catalog for your iPhone">
  <meta property="og:image" content="screenshots/appshelf.png">
  <meta property="og:type" content="website">

  <!-- iOS PWA -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="AppShelf">
  <meta name="theme-color" content="#000000">
  <meta name="mobile-web-app-capable" content="yes">

  <!-- Icons -->
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">

  <!-- PWA Manifest -->
  <link rel="manifest" href="manifest.json">

  <!-- Styles -->
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div id="app">
    <header class="header">
      <div class="header-title" id="header-title">AppShelf</div>
      <div class="header-subtitle" id="header-subtitle">Build 1</div>
      <div class="header-separator"></div>
    </header>
    <main class="app-list" id="app-list">
      <div class="pull-indicator" id="pull-indicator">
        <span class="spinner"></span>
      </div>
    </main>
  </div>
  <script type="module" src="js/app.js"></script>
</body>
</html>
